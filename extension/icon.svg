<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background: cream/butter gradient matching brand -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8df"/>
      <stop offset="100%" stop-color="#ffd64e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ffff"/>
      <stop offset="35%" stop-color="#8ef3ff"/>
      <stop offset="36%" stop-color="#1486ff"/>
      <stop offset="100%" stop-color="#0041c4"/>
    </linearGradient>
  </defs>

  <!-- Background square with rounded corners and dark border -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)" stroke="#171717" stroke-width="5"/>

  <!-- "AD" text in Impact — retro fake-ad stamp feel -->
  <!-- Shadow layers -->
  <text x="64" y="76" text-anchor="middle"
    font-family="Impact, 'Arial Narrow Bold', sans-serif"
    font-size="72" font-weight="900"
    fill="rgba(46,46,46,0.35)"
    transform="translate(5,5)">AD</text>

  <text x="64" y="76" text-anchor="middle"
    font-family="Impact, 'Arial Narrow Bold', sans-serif"
    font-size="72" font-weight="900"
    fill="rgba(38,87,166,0.6)"
    transform="translate(3,3)">AD</text>

  <!-- Main "AD" text with brand gradient -->
  <text x="64" y="76" text-anchor="middle"
    font-family="Impact, 'Arial Narrow Bold', sans-serif"
    font-size="72" font-weight="900"
    fill="url(#textGrad)"
    stroke="#00316c" stroke-width="2">AD</text>

  <!-- Small strikethrough line — the "Anti" part -->
  <line x1="14" y1="64" x2="114" y2="64" stroke="#ff5656" stroke-width="6" stroke-linecap="round"/>
</svg>
