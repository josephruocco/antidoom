<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AntiDoom</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">Sponsored by your future self</p>
      <h1 class="logo" aria-label="AntiDoom">AntiDoom</h1>
      <p class="intro">Popup ads, except they are trying to get your brain back.</p>

      <label class="row toggle">
        <span>Enable interruptions</span>
        <input id="enabled" type="checkbox">
      </label>

      <label class="row" for="interval">
        <span>Minutes between popups</span>
        <input id="interval" type="range" min="1" max="10" step="1">
      </label>
      <p class="value"><span id="intervalValue">3</span> min</p>

      <label class="row" for="maxPopups">
        <span>Max popups per page</span>
        <input id="maxPopups" type="range" min="1" max="8" step="1">
      </label>
      <p class="value"><span id="maxPopupsValue">4</span> per page</p>

      <button id="testPopup" class="test-button" type="button">Show test popup</button>

      <p id="status" class="status" aria-live="polite"></p>

      <p class="footer">Default sites: Reddit, YouTube, X, Instagram, TikTok, Facebook, Hacker News.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
